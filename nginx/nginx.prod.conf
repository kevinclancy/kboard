user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    types_hash_max_size 4096;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    map $http_user_agent $prerender_ua {
        default          0;
        "~*googlebot"    1;
        "~*bingbot"      1;
        "~*yandexbot"    1;
        "~*duckduckbot"  1;
        "~*slurp"        1;
        "~*baiduspider"  1;
        "~*facebookexternalhit" 1;
        "~*twitterbot"   1;
        "~*linkedinbot"  1;
        "~*whatsapp"     1;
        "~*applebot"     1;
        "~*Prerender"    0;
    }

    server {
        listen 443 ssl;
        server_name brokenjaw.net www.brokenjaw.net;

        ssl_certificate /etc/letsencrypt/live/brokenjaw.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/brokenjaw.net/privkey.pem;

        location ~ ^/boards {
            if ($prerender_ua) {
                rewrite .* /https://brokenjaw.net$request_uri break;
                proxy_pass http://prerender:3000;
            }

            proxy_pass http://webserver:5150;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://webserver:5150;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}