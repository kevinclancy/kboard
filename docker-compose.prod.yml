version: '3.8'

services:
  webserver:
    image: ${DOCKER_REGISTRY}/kboard:${IMAGE_TAG:-latest}
    command: ["./kboard-cli", "start", "--environment", "production", "--all"]
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - MAIL_APP_PWD=${MAIL_APP_PWD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - IMAGES_BUCKET_NAME=${IMAGES_BUCKET_NAME}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    volumes:
      - webserver_data:/data
    networks:
      - kboard_network
    restart: unless-stopped

  prerender:
    image: tvanro/prerender-alpine:latest
    networks:
      - kboard_network
    restart: unless-stopped

  nginx:
    image: ${DOCKER_REGISTRY}/kboard-nginx:${IMAGE_TAG:-latest}
    ports:
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - webserver
      - prerender
    networks:
      - kboard_network
    restart: unless-stopped

volumes:
  webserver_data:

networks:
  kboard_network:
    driver: bridge